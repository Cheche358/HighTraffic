services:
  # 1. Reverse Proxy & Load Balancer (Exclusivo en Manager)
  traefik:
    image: traefik:v2.11
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    deploy:
      placement:
        constraints:
          - node.role == manager

  # 2. Caché Distribuida
  redis:
    image: redis:7-alpine

  # 3. Cola de Mensajería
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"

  # 4. APIs / Workers (Despliegue Replicado y Parametrizado)
  api:
    image: hightraffic-api:latest
    build: ./app
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - redis
      - rabbitmq
    deploy:
      replicas: ${API_REPLICAS_MIN}
      update_config:
        parallelism: 2
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=PathPrefix(`/`)"
        - "traefik.http.services.api.loadbalancer.server.port=3000"

  # 5. Telegraf (Recolector de Métricas de Contenedores via Docker API)
  telegraf:
    image: telegraf:1.32-alpine
    # La imagen de Telegraf elimina privilegios a 'telegraf' via gosu en su
    # entrypoint, por lo que user:root no basta. Se anula el entrypoint para
    # ejecutar telegraf directamente como root y poder leer el socket de Docker.
    user: root
    entrypoint: ["telegraf"]
    command: ["--config", "/etc/telegraf/telegraf.conf"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    deploy:
      mode: global

  # 6. Prometheus (Servicio de Monitoreo)
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    deploy:
      placement:
        constraints:
          - node.role == manager

  # 7. Alertmanager (Disparador de Alertas)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    deploy:
      placement:
        constraints:
          - node.role == manager

  # 8. Autoscaler Webhook (Reemplazo de Orbiter, Exclusivo en Manager)
  autoscaler:
    image: hightraffic-autoscaler:latest
    build: ./autoscaler
    ports:
      - "9099:9099"
    environment:
      - SCALER_PORT=9099
      - SCALE_SERVICE=hightraffic_api
      - API_REPLICAS_MIN=${API_REPLICAS_MIN}
      - API_REPLICAS_MAX=${API_REPLICAS_MAX}
      - SCALE_UP_BY=${SCALE_UP_BY}
      - SCALE_DOWN_BY=${SCALE_DOWN_BY}
      - SCALE_COOLDOWN=${SCALE_COOLDOWN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./autoscaler/data:/app/data
    deploy:
      placement:
        constraints:
          - node.role == manager

networks:
  default:
    name: ht_net_v5
    driver: overlay
    ipam:
      config:
        - subnet: 172.30.0.0/16

global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alert.rules"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "telegraf"
    dns_sd_configs:
      - names:
          - "tasks.telegraf"
        type: "A"
        port: 9273

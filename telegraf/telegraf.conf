# ==============================================================================
# TELEGRAF - Recoleccion de metricas de contenedores via Docker Engine API
# Reemplaza a cAdvisor: consulta /containers/stats en lugar de /sys/fs/cgroup,
# por lo que funciona tanto en Linux como en Docker Desktop (Windows/Mac).
# ==============================================================================

[agent]
  interval = "5s"
  flush_interval = "5s"
  round_interval = true
  omit_hostname = false

# Input: Metricas de contenedores Docker (CPU/RAM/Red/IO por contenedor)
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  # perdevice=false: solo metricas agregadas por contenedor (no por CPU core)
  perdevice = false
  total = false
  timeout = "5s"

# Output: Exponer metricas en formato Prometheus para que las scrapee Prometheus
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2

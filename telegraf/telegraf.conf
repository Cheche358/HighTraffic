# ==============================================================================
# TELEGRAF - Recoleccion de metricas de contenedores via Docker Engine API
# Reemplaza a cAdvisor: consulta /containers/stats en lugar de /sys/fs/cgroup,
# por lo que funciona tanto en Linux como en Docker Desktop (Windows/Mac).
# ==============================================================================

[agent]
  interval = "5s"
  flush_interval = "5s"
  round_interval = true
  omit_hostname = false

# Input: Metricas de contenedores Docker (CPU/RAM/Red/IO por contenedor)
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  # perdevice=false: descarta metricas por dispositivo (por CPU core / por interfaz
  # de red) para reducir el cardinal. Solo se emiten metricas agregadas por contenedor.
  perdevice = false
  # total=true: emite los totales agregados de CPU, red (rx/tx bytes) y blkio por
  # contenedor. Necesario para que el panel muestre el transito de red de Traefik
  # (docker_container_net_rx_bytes / docker_container_net_tx_bytes).
  total = true
  timeout = "5s"

# Output: Exponer metricas en formato Prometheus para que las scrapee Prometheus
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
